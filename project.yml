name: RunCalendar
options:
  bundleIdPrefix: com.fercho.runcalendar
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0" # Modo Swift 5 para convivir sin fricción con Firebase
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM se define en RunCalendar/Resources/Secrets.xcconfig (gitignored)

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "7.1.0"

targets:
  RunCalendar:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RunCalendar
    configFiles:
      Debug: RunCalendar/Resources/Secrets.xcconfig
      Release: RunCalendar/Resources/Secrets.xcconfig
    info:
      path: RunCalendar/Resources/Info.plist
      properties:
        CFBundleDisplayName: RunCalendar
        UILaunchScreen: {}
        UIApplicationSupportsIndirectInputEvents: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - PermanentMarker.ttf
        NSHealthShareUsageDescription: >-
          RunCalendar lee tus entrenamientos y datos de condición física de Salud
          para estimar tu preparación hacia tus carreras.
        NSCalendarsWriteOnlyAccessUsageDescription: >-
          RunCalendar agrega tus carreras y entregas de kit a tu calendario.
        LSApplicationQueriesSchemes:
          - comgooglemaps
          - waze
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - $(REVERSED_CLIENT_ID)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fercho.runcalendar.app
        CODE_SIGN_ENTITLEMENTS: RunCalendar/Resources/RunCalendar.entitlements
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
        product: GoogleSignIn
