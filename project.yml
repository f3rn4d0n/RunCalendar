name: RunCalendar
options:
  bundleIdPrefix: com.fercho.runcalendar
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0" # Modo Swift 5 para convivir sin fricción con Firebase
    DEVELOPMENT_TEAM: "" # <-- Pon aquí tu Team ID de Apple Developer
    CODE_SIGN_STYLE: Automatic

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"

targets:
  RunCalendar:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: RunCalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fercho.runcalendar.app
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "RunCalendar"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGN_ENTITLEMENTS: RunCalendar/Resources/RunCalendar.entitlements
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: "YES"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
