included:
  - RunCalendar

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - first_where

line_length:
  warning: 120
  error: 160

identifier_name:
  min_length: 2
  excluded:
    - id
    - to
    - at

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 700
